<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">

  <!-- Left Text: WATT -->
  <text x="40" y="120"
        font-family="Orbitron, Arial Black, sans-serif"
        font-size="72"
        font-weight="900"
        letter-spacing="4"
        fill="#000">
    WATT
  </text>

  <!-- Circular Icon -->
  <g transform="translate(360,100)">
    <!-- Blue Ring -->
    <circle cx="0" cy="0" r="55"
            fill="none"
            stroke="#2D63C8"
            stroke-width="14"
            stroke-dasharray="300 80"
            stroke-linecap="round" />

    <!-- Lightning Bolt -->
    <polygon points="-10,-45 20,-5 5,-5 15,40 -25,0 -5,0"
             fill="#FF8C00"/>
  </g>

  <!-- Right Text: NWAY -->
  <text x="460" y="120"
        font-family="Orbitron, Arial Black, sans-serif"
        font-size="72"
        font-weight="900"
        letter-spacing="4"
        fill="#000">
    NWAY
  </text>

</svg>
